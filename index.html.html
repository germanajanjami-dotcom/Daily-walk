<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Walk">
<meta name="theme-color" content="#1a1a2e">
<title>Daily Walk</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f1a;
    --bg2: #16162a;
    --bg3: #1e1e35;
    --card: #1a1a30;
    --border: rgba(255,255,255,0.07);
    --gold: #c9a84c;
    --gold-soft: rgba(201,168,76,0.15);
    --gold-glow: rgba(201,168,76,0.3);
    --text: #e8e4da;
    --text-muted: rgba(232,228,218,0.5);
    --text-dim: rgba(232,228,218,0.25);
    --green: #4caf7d;
    --green-soft: rgba(76,175,125,0.12);
    --radius: 16px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(76,100,175,0.07) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* SCREENS */
  .screen { display: none; flex-direction: column; flex: 1; }
  .screen.active { display: flex; }

  /* TOP BAR */
  .topbar {
    padding: calc(var(--safe-top) + 16px) 24px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .app-wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
  }

  .streak-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--gold-soft);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 500;
    color: var(--gold);
  }

  /* HOME SCREEN */
  .home-hero {
    padding: 16px 24px 24px;
  }

  .home-date {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .home-greeting {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 300;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 4px;
  }

  .home-greeting em {
    font-style: italic;
    color: var(--gold);
  }

  /* ACTIVE CHALLENGE CARD */
  .challenge-card {
    margin: 0 24px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .challenge-card-header {
    background: linear-gradient(135deg, rgba(201,168,76,0.12) 0%, rgba(201,168,76,0.03) 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .challenge-theme-tag {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
  }

  .challenge-day-indicator {
    font-size: 12px;
    color: var(--text-muted);
  }

  .challenge-card-body { padding: 20px; }

  .challenge-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    margin-bottom: 12px;
    line-height: 1.3;
  }

  .progress-track {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
  }

  .progress-dot {
    flex: 1;
    height: 3px;
    border-radius: 2px;
    background: var(--border);
    transition: background 0.3s;
  }

  .progress-dot.done { background: var(--gold); }
  .progress-dot.today { background: rgba(201,168,76,0.5); }

  .challenge-card-action {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .day-status {
    font-size: 13px;
    color: var(--text-muted);
  }

  .day-status.completed { color: var(--green); }

  .btn-primary {
    background: var(--gold);
    color: #0f0f1a;
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn-primary:active { transform: scale(0.97); opacity: 0.9; }

  .btn-secondary {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }

  /* NO ACTIVE CHALLENGE */
  .no-challenge {
    margin: 0 24px 20px;
    background: var(--card);
    border: 1px dashed rgba(201,168,76,0.2);
    border-radius: var(--radius);
    padding: 32px 24px;
    text-align: center;
  }

  .no-challenge-icon {
    font-size: 36px;
    margin-bottom: 12px;
  }

  .no-challenge h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    margin-bottom: 8px;
  }

  .no-challenge p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 20px;
  }

  /* SECTION HEADERS */
  .section-header {
    padding: 0 24px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* CHALLENGE LIST */
  .challenge-list {
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
  }

  .challenge-list-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.1s;
  }

  .challenge-list-item:active { transform: scale(0.99); }
  .challenge-list-item:hover { border-color: rgba(201,168,76,0.3); }

  .challenge-list-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--gold-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .challenge-list-info { flex: 1; }

  .challenge-list-name {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 2px;
  }

  .challenge-list-meta {
    font-size: 12px;
    color: var(--text-muted);
  }

  .challenge-list-arrow {
    color: var(--text-dim);
    font-size: 16px;
  }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: rgba(15,15,26,0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 12px 0 calc(var(--safe-bottom) + 12px);
    display: flex;
    z-index: 100;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    padding: 4px 0;
    transition: opacity 0.2s;
  }

  .nav-icon { font-size: 20px; line-height: 1; }

  .nav-label {
    font-size: 10px;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    transition: color 0.2s;
  }

  .nav-item.active .nav-label { color: var(--gold); }
  .nav-item.active .nav-icon { filter: brightness(1.2); }

  /* Add spacer for fixed nav */
  .nav-spacer { height: calc(80px + var(--safe-bottom)); }

  /* DAILY VIEW SCREEN */
  .daily-header {
    padding: calc(var(--safe-top) + 16px) 24px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .back-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text);
    font-size: 16px;
    flex-shrink: 0;
  }

  .daily-header-info { flex: 1; }

  .daily-header-theme {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
  }

  .daily-header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
  }

  .daily-content {
    flex: 1;
    overflow-y: auto;
    padding: 0 24px;
    -webkit-overflow-scrolling: touch;
  }

  /* Day tabs */
  .day-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    overflow-x: auto;
    padding-bottom: 4px;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .day-tabs::-webkit-scrollbar { display: none; }

  .day-tab {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.2s;
    position: relative;
  }

  .day-tab.done { background: var(--green-soft); border-color: rgba(76,175,125,0.3); color: var(--green); }
  .day-tab.active { background: var(--gold-soft); border-color: rgba(201,168,76,0.4); color: var(--gold); }
  .day-tab.locked { opacity: 0.35; cursor: not-allowed; }

  /* Content blocks */
  .verse-block {
    background: linear-gradient(135deg, rgba(201,168,76,0.08), rgba(201,168,76,0.02));
    border: 1px solid rgba(201,168,76,0.15);
    border-left: 3px solid var(--gold);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }

  .verse-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 300;
    font-style: italic;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 10px;
  }

  .verse-ref {
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
  }

  .content-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 12px;
  }

  .content-block-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .content-block-label span { font-size: 14px; }

  .content-block-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }

  .action-block {
    background: linear-gradient(135deg, rgba(76,175,125,0.08), rgba(76,175,125,0.02));
    border: 1px solid rgba(76,175,125,0.15);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 12px;
  }

  .action-block-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .action-block-label span { font-size: 14px; }

  /* Reflection */
  .reflection-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 12px;
  }

  .reflection-question {
    font-size: 14px;
    font-style: italic;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .reflection-textarea {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    resize: none;
    min-height: 100px;
    outline: none;
    transition: border-color 0.2s;
  }

  .reflection-textarea:focus { border-color: rgba(201,168,76,0.4); }
  .reflection-textarea::placeholder { color: var(--text-dim); }

  /* Complete button */
  .complete-section {
    margin-bottom: 16px;
  }

  .complete-btn {
    width: 100%;
    background: var(--green-soft);
    border: 1px solid rgba(76,175,125,0.3);
    border-radius: 14px;
    padding: 16px;
    color: var(--green);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
  }

  .complete-btn:active { transform: scale(0.98); }

  .complete-btn.done {
    background: rgba(76,175,125,0.2);
    border-color: rgba(76,175,125,0.5);
    cursor: default;
  }

  /* ARCHIVE SCREEN */
  .archive-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }

  .archive-empty-icon { font-size: 48px; margin-bottom: 16px; }

  .archive-empty h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    margin-bottom: 8px;
  }

  .archive-empty p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

  .archive-list { padding: 0 24px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }

  .archive-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .archive-item:hover { border-color: rgba(201,168,76,0.2); }

  .archive-check {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--green-soft);
    border: 1px solid rgba(76,175,125,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--green);
    font-size: 14px;
    flex-shrink: 0;
  }

  .archive-info { flex: 1; }

  .archive-name { font-size: 15px; font-weight: 500; margin-bottom: 2px; }

  .archive-meta { font-size: 12px; color: var(--text-muted); }

  /* JOURNAL SCREEN */
  .journal-entry {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin: 0 24px 10px;
    animation: fadeUp 0.3s ease;
  }

  .journal-entry-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .journal-entry-title { font-size: 13px; font-weight: 500; color: var(--gold); }
  .journal-entry-date { font-size: 11px; color: var(--text-dim); }

  .journal-entry-text {
    font-size: 14px;
    line-height: 1.65;
    color: var(--text-muted);
    font-style: italic;
  }

  /* MODAL for challenge picker */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 200;
    align-items: flex-end;
  }

  .modal-overlay.open { display: flex; }

  .modal-sheet {
    width: 100%;
    max-width: 430px;
    margin: 0 auto;
    background: var(--bg2);
    border-radius: 24px 24px 0 0;
    border-top: 1px solid var(--border);
    padding: 0 0 calc(var(--safe-bottom) + 24px);
    animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 85vh;
    overflow-y: auto;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 20px;
  }

  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    padding: 0 24px 16px;
    border-bottom: 1px solid var(--border);
  }

  .modal-list { padding: 12px 24px; display: flex; flex-direction: column; gap: 8px; }

  .modal-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.1s;
  }

  .modal-item:active { transform: scale(0.99); }
  .modal-item:hover { border-color: rgba(201,168,76,0.3); }

  .modal-item-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--gold-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .modal-item-info { flex: 1; }
  .modal-item-name { font-size: 15px; font-weight: 500; margin-bottom: 2px; }
  .modal-item-desc { font-size: 12px; color: var(--text-muted); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: calc(90px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 300;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Scroll padding */
  .scroll-content { padding-bottom: 24px; }
</style>
</head>
<body>
<div id="app">

  <!-- ===== HOME SCREEN ===== -->
  <div class="screen active" id="screen-home">
    <div class="topbar">
      <div class="app-wordmark">Daily Walk</div>
      <div class="streak-badge" id="home-streak">🔥 0 days</div>
    </div>

    <div class="home-hero">
      <div class="home-date" id="home-date"></div>
      <div class="home-greeting">Walk in the <em>light</em> today.</div>
    </div>

    <!-- Active challenge card OR empty state -->
    <div id="home-challenge-area"></div>

    <div class="section-header">
      <div class="section-title">All Challenges</div>
    </div>

    <div class="challenge-list">
      <!-- populated by JS -->
    </div>

    <div class="nav-spacer"></div>
  </div>

  <!-- ===== DAILY VIEW SCREEN ===== -->
  <div class="screen" id="screen-daily">
    <div class="daily-header">
      <div class="back-btn" onclick="goHome()">&#8592;</div>
      <div class="daily-header-info">
        <div class="daily-header-theme" id="daily-theme-label"></div>
        <div class="daily-header-title" id="daily-challenge-title"></div>
      </div>
    </div>

    <div class="daily-content">
      <div class="day-tabs" id="day-tabs"></div>
      <div id="day-content"></div>
      <div class="nav-spacer"></div>
    </div>
  </div>

  <!-- ===== ARCHIVE SCREEN ===== -->
  <div class="screen" id="screen-archive">
    <div class="topbar">
      <div class="app-wordmark">Archive</div>
    </div>
    <div id="archive-content" style="flex:1; overflow-y:auto;">
      <div class="nav-spacer"></div>
    </div>
  </div>

  <!-- ===== JOURNAL SCREEN ===== -->
  <div class="screen" id="screen-journal">
    <div class="topbar">
      <div class="app-wordmark">Journal</div>
    </div>
    <div id="journal-content" style="flex:1; overflow-y:auto;">
      <div class="nav-spacer"></div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <div class="nav-item active" id="nav-home" onclick="switchTab('home')">
      <div class="nav-icon">🏠</div>

// =============================================
// STATE
// =============================================
function loadState() {
  try {
    return JSON.parse(localStorage.getItem('dailywalk_v1') || '{}');
  } catch(e) { return {}; }
}

function saveState(s) {
  localStorage.setItem('dailywalk_v1', JSON.stringify(s));
}

let state = loadState();
// state shape:
// {
//   activeChallenge: { id, startDate, completedDays: [0,1,...], reflections: {0: "text", ...} }
//   archive: [{ id, completedDate, reflections }]
//   totalDaysCompleted: 0
// }

// =============================================
// NAVIGATION
// =============================================
let currentTab = 'home';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  document.getElementById('nav-' + tab).classList.add('active');

  if (tab === 'home') renderHome();
  if (tab === 'archive') renderArchive();
  if (tab === 'journal') renderJournal();
}

function goHome() {
  switchTab('home');
}

// =============================================
// HOME RENDER
// =============================================
function renderHome() {
  // Date
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  document.getElementById('home-date').textContent = dateStr;

  // Streak
  const totalDays = state.totalDaysCompleted || 0;
  document.getElementById('home-streak').innerHTML = `🔥 ${totalDays} day${totalDays !== 1 ? 's' : ''}`;

  // Active challenge or empty
  const area = document.getElementById('home-challenge-area');
  if (state.activeChallenge) {
    const ch = CHALLENGES.find(c => c.id === state.activeChallenge.id);
    const ac = state.activeChallenge;
    const completedCount = (ac.completedDays || []).length;
    const todayIdx = completedCount < ch.duration ? completedCount : ch.duration - 1;
    const todayDone = (ac.completedDays || []).includes(todayIdx);

    let dots = '';
    for (let i = 0; i < ch.duration; i++) {
      const done = (ac.completedDays || []).includes(i);
      const isToday = i === todayIdx;
      dots += `<div class="progress-dot ${done ? 'done' : (isToday ? 'today' : '')}"></div>`;
    }

    area.innerHTML = `
      <div class="challenge-card" onclick="openActiveChallenge()">
        <div class="challenge-card-header">
          <div class="challenge-theme-tag">${ch.theme}</div>
          <div class="challenge-day-indicator">Day ${completedCount + 1} of ${ch.duration}</div>
        </div>
        <div class="challenge-card-body">
          <div class="challenge-title">${ch.title}</div>
          <div class="progress-track">${dots}</div>
          <div class="challenge-card-action">
            <div class="day-status ${todayDone ? 'completed' : ''}">${todayDone ? '✓ Today complete' : 'Today\'s reading awaits'}</div>
            <button class="btn-primary">${todayDone ? 'Review' : 'Continue'}</button>
          </div>
        </div>
      </div>
    `;
  } else {
    area.innerHTML = `
      <div class="no-challenge">
        <div class="no-challenge-icon">📖</div>
        <h3>No active challenge</h3>
        <p>Choose a challenge below to begin your daily walk with scripture.</p>
        <button class="btn-primary" onclick="openPicker()">Begin a Challenge</button>
      </div>
    `;
  }

  // Challenge list (only not-active ones, or all if no active)
  const list = document.querySelector('.challenge-list');
  const availableChallenges = CHALLENGES.filter(c => {
    if (state.activeChallenge && state.activeChallenge.id === c.id) return false;
    return true;
  });

  list.innerHTML = availableChallenges.map(c => {
    const archived = (state.archive || []).find(a => a.id === c.id);
    return `
      <div class="challenge-list-item" onclick="onChallengeListClick('${c.id}')">
        <div class="challenge-list-icon">${c.icon}</div>
        <div class="challenge-list-info">
          <div class="challenge-list-name">${c.title}</div>
          <div class="challenge-list-meta">${c.duration} days · ${c.theme}${archived ? ' · ✓ Completed' : ''}</div>
        </div>
        <div class="challenge-list-arrow">›</div>
      </div>
    `;
  }).join('');
}

function onChallengeListClick(id) {
  if (state.activeChallenge) {
    showToast('Complete your active challenge first.');
    return;
  }
  // start this challenge
  startChallenge(id);
}

function openActiveChallenge() {
  if (!state.activeChallenge) return;
  const ch = CHALLENGES.find(c => c.id === state.activeChallenge.id);
  const completedCount = (state.activeChallenge.completedDays || []).length;
  const todayIdx = Math.min(completedCount, ch.duration - 1);
  openDailyView(state.activeChallenge.id, todayIdx);
}

// =============================================
// DAILY VIEW
// =============================================
let currentViewChallenge = null;
let currentViewDay = 0;

function openDailyView(challengeId, dayIndex) {
  currentViewChallenge = challengeId;
  currentViewDay = dayIndex;

  const ch = CHALLENGES.find(c => c.id === challengeId);
  document.getElementById('daily-theme-label').textContent = ch.theme;
  document.getElementById('daily-challenge-title').textContent = ch.title;

  renderDayTabs(ch);
  renderDayContent(ch, dayIndex);

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-daily').classList.add('active');
}

function renderDayTabs(ch) {
  const ac = state.activeChallenge;
  const completedDays = ac ? (ac.completedDays || []) : [];
  const completedCount = completedDays.length;

  const tabs = document.getElementById('day-tabs');
  tabs.innerHTML = Array.from({length: ch.duration}, (_, i) => {
    const done = completedDays.includes(i);
    const isActive = i === currentViewDay;
    const isLocked = !done && i > completedCount;
    let cls = '';
    if (done) cls = 'done';
    else if (isActive) cls = 'active';
    else if (isLocked) cls = 'locked';

    const clickable = done || i === completedCount;
    return `<div class="day-tab ${cls}" onclick="${clickable ? `switchDay(${i})` : 'showToast(\'Complete previous days first.\')'}">${i + 1}</div>`;
  }).join('');
}

function switchDay(idx) {
  currentViewDay = idx;
  const ch = CHALLENGES.find(c => c.id === currentViewChallenge);
  renderDayTabs(ch);
  renderDayContent(ch, idx);
}

function renderDayContent(ch, idx) {
  const day = ch.days[idx];
  const ac = state.activeChallenge;
  const completedDays = ac ? (ac.completedDays || []) : [];
  const isDone = completedDays.includes(idx);
  const savedReflection = ac && ac.reflections ? (ac.reflections[idx] || '') : '';
  const completedCount = completedDays.length;
  const isCurrentDay = idx === completedCount;

  document.getElementById('day-content').innerHTML = `
    <div class="verse-block">
      <div class="verse-text">${day.verse}</div>
      <div class="verse-ref">— ${day.ref}</div>
    </div>

    <div class="content-block">
      <div class="content-block-label"><span>💡</span> Today's Meaning</div>
      <div class="content-block-text">${day.explanation}</div>
    </div>

    <div class="content-block">
      <div class="content-block-label"><span>🌍</span> Real-Life Example</div>
      <div class="content-block-text">${day.example}</div>
    </div>

    <div class="action-block">
      <div class="action-block-label"><span>⚡</span> Today's Action Step</div>
      <div class="content-block-text">${day.action}</div>
    </div>

    <div class="reflection-block">
      <div class="content-block-label"><span>✍️</span> Reflection</div>
      <div class="reflection-question">${day.reflection}</div>
      <textarea class="reflection-textarea" id="reflection-input" placeholder="Write your thoughts here..." ${isDone ? '' : ''}>${savedReflection}</textarea>
    </div>

    <div class="complete-section">
      ${isCurrentDay && !isDone ? `
        <button class="complete-btn" onclick="completeDay(${idx})">
          <span>✓</span> Mark Day ${idx + 1} Complete
        </button>
      ` : isDone ? `
        <button class="complete-btn done">
          <span>✓</span> Day ${idx + 1} Completed
        </button>
      ` : ''}
    </div>
  `;

  // Auto-save reflection on input
  const textarea = document.getElementById('reflection-input');
  if (textarea) {
    textarea.addEventListener('input', () => {
      if (!state.activeChallenge) return;
      if (!state.activeChallenge.reflections) state.activeChallenge.reflections = {};
      state.activeChallenge.reflections[idx] = textarea.value;
      saveState(state);
    });
  }
}

function completeDay(idx) {
  // Save reflection first
  const textarea = document.getElementById('reflection-input');
  if (textarea && state.activeChallenge) {
    if (!state.activeChallenge.reflections) state.activeChallenge.reflections = {};
    state.activeChallenge.reflections[idx] = textarea.value;
  }

  if (!state.activeChallenge.completedDays) state.activeChallenge.completedDays = [];
  if (!state.activeChallenge.completedDays.includes(idx)) {
    state.activeChallenge.completedDays.push(idx);
    state.totalDaysCompleted = (state.totalDaysCompleted || 0) + 1;
  }

  const ch = CHALLENGES.find(c => c.id === currentViewChallenge);

  // Check if challenge is fully complete
  if (state.activeChallenge.completedDays.length >= ch.duration) {
    // Archive it
    if (!state.archive) state.archive = [];
    state.archive.push({
      id: ch.id,
      completedDate: new Date().toISOString(),
      reflections: state.activeChallenge.reflections || {}
    });
    state.activeChallenge = null;
    saveState(state);
    showToast('🎉 Challenge complete! Well done.');
    setTimeout(() => goHome(), 1500);
    return;
  }

  saveState(state);
  renderDayTabs(ch);
  renderDayContent(ch, idx);
  showToast('Day ' + (idx + 1) + ' complete!');
}

// =============================================
// CHALLENGE PICKER
// =============================================
function openPicker() {
  const available = CHALLENGES.filter(c => !state.activeChallenge || state.activeChallenge.id !== c.id);
  document.getElementById('modal-list').innerHTML = available.map(c => `
    <div class="modal-item" onclick="startChallenge('${c.id}')">
      <div class="modal-item-icon">${c.icon}</div>
      <div class="modal-item-info">
        <div class="modal-item-name">${c.title}</div>
        <div class="modal-item-desc">${c.duration} days · ${c.theme}</div>
      </div>
    </div>
  `).join('');
  document.getElementById('modal-picker').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-picker')) {
    document.getElementById('modal-picker').classList.remove('open');
  }
}

function startChallenge(id) {
  if (state.activeChallenge) {
    showToast('Complete your current challenge first.');
    return;
  }
  state.activeChallenge = {
    id,
    startDate: new Date().toISOString(),
    completedDays: [],
    reflections: {}
  };
  saveState(state);
  document.getElementById('modal-picker').classList.remove('open');
  renderHome();
  showToast('Challenge started! Day 1 is ready.');
}

// =============================================
// ARCHIVE
// =============================================
function renderArchive() {
  const container = document.getElementById('archive-content');
  const archives = state.archive || [];

  if (archives.length === 0) {
    container.innerHTML = `
      <div class="archive-empty">
        <div class="archive-empty-icon">📜</div>
        <h3>Nothing here yet</h3>
        <p>Complete your first challenge and it will be saved here forever.</p>
      </div>
      <div class="nav-spacer"></div>
    `;
    return;
  }

  container.innerHTML = `
    <div style="padding: 16px 24px 8px;">
      <div class="section-title">${archives.length} Challenge${archives.length !== 1 ? 's' : ''} Completed</div>
    </div>
    <div class="archive-list">
      ${archives.map(a => {
        const ch = CHALLENGES.find(c => c.id === a.id);
        const date = new Date(a.completedDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        return `
          <div class="archive-item">
            <div class="archive-check">✓</div>
            <div class="archive-info">
              <div class="archive-name">${ch ? ch.title : a.id}</div>
              <div class="archive-meta">Completed ${date} · ${ch ? ch.duration : '?'} days</div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
    <div class="nav-spacer"></div>
  `;
}

// =============================================
// JOURNAL
// =============================================
function renderJournal() {
  const container = document.getElementById('journal-content');

  // Collect all reflections: from active + archive
  const entries = [];

  if (state.activeChallenge) {
    const ch = CHALLENGES.find(c => c.id === state.activeChallenge.id);
    const reflections = state.activeChallenge.reflections || {};
    Object.entries(reflections).forEach(([dayIdx, text]) => {
      if (text && text.trim()) {
        entries.push({
          challengeName: ch ? ch.title : '',
          theme: ch ? ch.theme : '',
          day: parseInt(dayIdx) + 1,
          text,
          date: null
        });
      }
    });
  }

  (state.archive || []).forEach(a => {
    const ch = CHALLENGES.find(c => c.id === a.id);
    const reflections = a.reflections || {};
    Object.entries(reflections).forEach(([dayIdx, text]) => {
      if (text && text.trim()) {
        entries.push({
          challengeName: ch ? ch.title : '',
          theme: ch ? ch.theme : '',
          day: parseInt(dayIdx) + 1,
          text,
          date: a.completedDate
        });
      }
    });
  });

  if (entries.length === 0) {
    container.innerHTML = `
      <div class="archive-empty">
        <div class="archive-empty-icon">✍️</div>
        <h3>Your journal is empty</h3>
        <p>Your reflection notes will appear here as you complete your daily challenges.</p>
      </div>
      <div class="nav-spacer"></div>
    `;
    return;
  }

  container.innerHTML = `
    <div style="padding: 16px 24px 8px;">
      <div class="section-title">${entries.length} Reflection${entries.length !== 1 ? 's' : ''}</div>
    </div>
    ${entries.map(e => `
      <div class="journal-entry">
        <div class="journal-entry-header">
          <div class="journal-entry-title">${e.challengeName} — Day ${e.day}</div>
          <div class="journal-entry-date">${e.theme}</div>
        </div>
        <div class="journal-entry-text">"${e.text}"</div>
      </div>
    `).join('')}
    <div class="nav-spacer"></div>
  `;
}

// =============================================
// TOAST
// =============================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// =============================================
// INIT
// =============================================
renderHome();
</script>
</body>
</html>
